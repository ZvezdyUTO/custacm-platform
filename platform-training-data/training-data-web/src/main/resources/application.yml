server:
  port: ${TRAINING_DATA_WEB_PORT:8082}

spring:
  application:
    name: training-data-web
  datasource:
    url: ${TRAINING_DATA_DB_URL:jdbc:mysql://localhost:3306/custacm_training?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${TRAINING_DATA_DB_USERNAME:root}
    password: ${TRAINING_DATA_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

platform:
  auth:
    jwt:
      public-key: ${AUTH_JWT_PUBLIC_KEY:}
      public-key-path: ${AUTH_JWT_PUBLIC_KEY_PATH:}
