services:
  auth-db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME}
      MYSQL_USER: ${AUTH_DB_USERNAME}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${AUTH_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  custacm-backend:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE_PATH: platform-auth/auth-web
        JAR_PATH: platform-auth/auth-web/target/auth-web-0.1.0-SNAPSHOT.jar
        APP_PORT: 8081
    environment:
      AUTH_WEB_PORT: ${AUTH_WEB_PORT:-8081}
      AUTH_DB_URL: jdbc:mysql://auth-db:3306/${AUTH_DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      AUTH_DB_USERNAME: ${AUTH_DB_USERNAME}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_JWT_PRIVATE_KEY_PATH: /run/secrets/auth-private-key.pem
      AUTH_JWT_PUBLIC_KEY_PATH: /run/secrets/auth-public-key.pem
      AUTH_JWT_ACCESS_TOKEN_TTL: ${AUTH_JWT_ACCESS_TOKEN_TTL}
      AUTH_BOOTSTRAP_ADMIN_STUDENT_IDENTITY: ${AUTH_BOOTSTRAP_ADMIN_STUDENT_IDENTITY}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD}
      LOG_DIR: /app/logs
    ports:
      - "${BACKEND_PORT}:8081"
    volumes:
      - ../logs:/app/logs
      - ${AUTH_JWT_PRIVATE_KEY_HOST_PATH}:/run/secrets/auth-private-key.pem:ro
      - ${AUTH_JWT_PUBLIC_KEY_HOST_PATH}:/run/secrets/auth-public-key.pem:ro
    depends_on:
      auth-db:
        condition: service_healthy

volumes:
  auth-db-data:
